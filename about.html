<!DOCTYPE html>
<html>
<head>
<title>About | Hina Atif</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
  overflow-x:hidden;
  position:relative;
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 80px;
  position:relative;
  z-index:10;
}

.logo{
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff7a18,#ff00ff,#00c6ff);
  -webkit-background-clip:text;
  color:transparent;
  animation: glowText 3s infinite alternate;
}

@keyframes glowText{
  0%{filter: drop-shadow(0 0 5px gold);}
  100%{filter: drop-shadow(0 0 20px gold);}
}

.nav-links{
  display:flex;
  gap:30px;
}

.nav-links a{
  color:white;
  text-decoration:none;
}

.nav-links a:hover{
  color:#00c6ff;
}

.container{
  text-align:center;
  padding:120px 20px;
  max-width:900px;
  margin:auto;
  position:relative;
  z-index:10;
}

h1{
  color:gold;
  font-family:Georgia, serif;
}

footer{
  text-align:center;
  padding:40px;
  color:#aaa;
  position:relative;
  z-index:10;
}

.particle {
  position:absolute;
  border-radius:50%;
  background:rgba(0,198,255,0.4);
  pointer-events:none;
  width:10px;
  height:10px;
  mix-blend-mode:screen;
  animation: float 5s infinite;
}

@keyframes float {
  0% {transform: translate(0,0);}
  50% {transform: translate(20px, -20px);}
  100% {transform: translate(0,0);}
}

.cursor-shadow {
  position: fixed;
  left: 0;
  top: 0;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  pointer-events: none;
  background: rgba(255,215,0,0.5);
  box-shadow: 0 0 20px 10px rgba(255,215,0,0.4);
  transform: translate(-50%, -50%);
  transition: transform 0.05s ease-out;
  z-index:9999;
  mix-blend-mode: screen;
}
</style>
</head>

<body>

<nav>
    <div class="logo">Hina Atif</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="posts.html">Posts</a>
        <a href="projects.html">Projects</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<div class="container">
<h1>About Me</h1>
<p>Hi, I'm Hina Atif, exploring DevOps, Cloud, and Automation. I create projects and share blogs to help others learn.</p>
</div>

<footer>
✦ Hina Atif  
© 2025 All Rights Reserved.
</footer>

<script>
const numParticles=40;
for(let i=0;i<numParticles;i++){
  const p=document.createElement('div');
  p.classList.add('particle');
  p.style.left=Math.random()*window.innerWidth+'px';
  p.style.top=Math.random()*window.innerHeight+'px';
  p.style.width=(5+Math.random()*10)+'px';
  p.style.height=p.style.width;
  p.style.animationDuration=(3+Math.random()*5)+'s';
  document.body.appendChild(p);
}

const cursor=document.createElement('div');
cursor.classList.add('cursor-shadow');
document.body.appendChild(cursor);

document.addEventListener('mousemove',e=>{
  cursor.style.transform=`translate(${e.clientX}px, ${e.clientY}px)`;
});
</script>

</body>
</html>
