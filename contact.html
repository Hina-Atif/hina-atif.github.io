<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Hina Atif</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d1117;
  color: #cbd5e1;
  cursor: none;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
}

.navbar a {
  color: #cbd5e1;
  text-decoration: none;
  font-weight: bold;
}

.navbar a:hover {
  color: #4f97ff;
}

/* CONTAINER */
.container {
  text-align: center;
  padding: 60px 20px;
}

/* FORM */
form {
  max-width: 500px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 15px;
  border: 1px solid rgba(255,255,255,0.1);
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #161b22;
  color: white;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #4f97ff;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #00e0ff;
  box-shadow: 0 0 15px #00e0ff;
}

/* LINKS */
.links {
  margin-top: 30px;
}

.links a {
  display: block;
  margin: 10px;
  color: #4f97ff;
  text-decoration: none;
  font-weight: bold;
}

.links a:hover {
  text-decoration: underline;
}

/* FOOTER */
footer {
  margin-top: 40px;
  font-size: 0.9rem;
}

/* CUSTOM CURSOR */
.cursor {
  position: fixed;
  width: 20px;
  height: 20px;
  background: #4f97ff;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 9999;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="index.html">Home</a>
  <a href="posts.html">Posts</a>
  <a href="projects.html">Projects</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</div>

<div class="container">
  <h1>Contact Me</h1>
  <p>Let's talk. I'm currently open for new opportunities (Remotely).</p>

  <!-- CONTACT FORM -->
  <form action="mailto:hinaatif355@gmail.com" method="POST" enctype="text/plain">
    
    <label>Your Name</label>
    <input type="text" name="name" placeholder="Enter your name" required>

    <label>Your Email</label>
    <input type="email" name="email" placeholder="Enter your email" required>

    <label>Message</label>
    <textarea name="message" rows="5" placeholder="Write your message here..." required></textarea>

    <button type="submit">Send Message</button>
  </form>

  <!-- CONTACT INFO -->
  <div class="links">
    <p><strong>Email:</strong> hinaatif355@gmail.com</p>

    <a href="mailto:hinaatif355@gmail.com">Send Email</a>
    <a href="https://www.linkedin.com/in/hina-atif-devopsengineer" target="_blank">Connect on LinkedIn</a>
    <a href="https://github.com/Hina-Atif" target="_blank">Connect on GitHub</a>
  </div>

  <footer>© 2025 All Rights Reserved</footer>
</div>

<script>
let cursor = document.createElement("div");
cursor.className = "cursor";
document.body.appendChild(cursor);

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
