<script>
// Mapping each card to its GitHub repo
const projectLinks = [
  // Featured Projects
  "https://github.com/Hina-Atif/AWS-EC2-DOCKER-DEPLOYMENT-HINA-ATIF",
  "https://github.com/Hina-Atif/static-website-deployment-on-s3-hina-atif",
  "https://github.com/Hina-Atif/aws-vpc-networking-project",
  "https://github.com/Hina-Atif/aws-serverless-data-management",
  "https://github.com/Hina-Atif/Scalable-Node.js-Deployment-on-AWS-ECS-Fargate",
  "https://github.com/Hina-Atif/aws-python-http-api-project",
  // Enterprise Projects
  "https://github.com/Hina-Atif/CloudWatch-Lite-Monitoring-Platform",
  "https://github.com/Hina-Atif/CloudBank-Microservices-Banking-Platform",
  "https://github.com/Hina-Atif/CloudTel-Telecom-Self-Service-Platform",
  "https://github.com/Hina-Atif/SkyRoute-Air-Ticket-Booking-Platform"
];

// Select all card elements
const cards = document.querySelectorAll(".projects .card");

// Add click listener to each card
cards.forEach((card, index) => {
  card.style.cursor = "pointer"; // show pointer
  card.addEventListener("click", () => {
    const url = projectLinks[index];
    window.open(url, "_blank"); // open GitHub repo in new tab
  });
});
</script>
