<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects | Hina Atif</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b0b0f;
    color:white;
    overflow-x:hidden;
    position:relative;
}

/* GOLDEN CURSOR - Desktop Only */
.cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    background: gold;
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 15px gold, 0 0 30px gold;
    transform: translate(-50%, -50%);
    z-index: 9999;
    display: none;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items: center;
    padding: 20px 5%;
    position:fixed;
    width:90%;
    z-index:100;
    background:rgba(11, 11, 15, 0.9);
    backdrop-filter: blur(10px);
}
.logo{
    font-size:24px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff7a18,#ff00ff,#00c6ff);
    -webkit-background-clip:text;
    color:transparent;
}
nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}
nav ul li a{
    color:white;
    text-decoration:none;
    font-size: 14px;
}

/* CONTAINER */
.container{
    text-align:center;
    padding: 120px 20px 40px;
    max-width:1200px;
    margin:auto;
}

/* CATEGORY BUTTONS */
.category-boxes{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}
.category{
    padding:15px 30px;
    background:#15151c;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    flex: 1;
    max-width: 300px;
}

/* PROJECT GRID */
.projects{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    margin-top:40px;
    justify-items:center;
}

/* CARD */
.card{
    background:#15151c;
    width:100%;
    max-width:320px;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    text-align:left;
    text-decoration:none;
    color:inherit;
    display:block;
}
.card img{
    width:100%;
    height:180px;
    object-fit:cover; /* This fixes image distortion */
}
.card-title{
    padding:15px;
    font-weight:bold;
    font-size:16px;
}
.tech{
    padding:0 15px 15px;
}
.badge{
    display:inline-block;
    background:#00c6ff;
    color:black;
    padding:4px 8px;
    border-radius:4px;
    font-size:11px;
    margin:2px 2px 2px 0;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
    nav { flex-direction: column; width: 100%; padding: 15px 0; }
    nav ul { margin-top: 10px; gap: 10px; }
    .container { padding-top: 150px; }
    .category-boxes { flex-direction: column; align-items: center; }
    .category { width: 90%; }
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<nav>
<div class="logo">Hina Atif</div>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div class="container">
<h1>My Projects</h1>

<div class="category-boxes">
<div class="category" onclick="document.getElementById('featured').scrollIntoView({behavior: 'smooth'})">Featured</div>
<div class="category" onclick="document.getElementById('enterprise').scrollIntoView({behavior: 'smooth'})">Enterprise</div>
</div>

<h2 id="featured" style="margin-top:100px; text-align: left;">Featured Projects</h2>
<div class="projects">
    <a href="#" class="card">
        <img src="image_1fb2e5.png"> <div class="card-title">AWS VPC Networking</div>
        <div class="tech"><span class="badge">VPC</span><span class="badge">AWS</span></div>
    </a>

    <a href="#" class="card">
        <img src="image_1fb321.png"> <div class="card-title">Node.js ECS Fargate</div>
        <div class="tech"><span class="badge">ECS</span><span class="badge">Node.js</span></div>
    </a>

    <a href="#" class="card">
        <img src="image_1fb343.png"> <div class="card-title">AWS Python HTTP API</div>
        <div class="tech"><span class="badge">Python</span><span class="badge">API</span></div>
    </a>
</div>

<h2 id="enterprise" style="margin-top:100px; text-align: left;">Enterprise Projects</h2>
<div class="projects">
    <a href="#" class="card">
        <img src="image_1fb37c.png"> <div class="card-title">SkyRoute Ticket Platform</div>
        <div class="tech"><span class="badge">Docker</span><span class="badge">Microservices</span></div>
    </a>

    <a href="#" class="card">
        <img src="image_1fb39a.png"> <div class="card-title">CloudBank Platform</div>
        <div class="tech"><span class="badge">FinTech</span><span class="badge">Cloud</span></div>
    </a>
</div>
</div>

<script>
const cursor = document.getElementById("cursor");
const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

if (!isTouch) {
    cursor.style.display = "block";
    document.body.style.cursor = "none";
    document.addEventListener("mousemove", e => {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
    });
}
</script>

</body>
</html>
