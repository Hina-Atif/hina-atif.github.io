<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects | Hina Atif</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b0b0f;
    color:white;
    overflow-x:hidden;
    position:relative;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 80px;
    position:fixed;
    width:100%;
    z-index:100;
    background:#0b0b0f;
}
.logo{
    font-size:28px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff7a18,#ff00ff,#00c6ff);
    -webkit-background-clip:text;
    color:transparent;
}
nav ul{
    list-style:none;
    display:flex;
    gap:30px;
}
nav ul li a{
    color:white;
    text-decoration:none;
}

/* CONTAINER */
.container{
    text-align:center;
    padding:160px 40px;
    max-width:1200px;
    margin:auto;
}

/* CATEGORY BUTTONS */
.category-boxes{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:40px;
}
.category{
    padding:25px 60px;
    background:#15151c;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
.category:hover{
    background:#1d1d27;
    transform:translateY(-5px);
    box-shadow:0 0 20px #00c6ff; /* 🔥 BLUE HOVER */
}

/* PROJECT GRID */
.projects{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    margin-top:40px;
    justify-items:center;
}

/* CARD */
.card{
    background:#15151c;
    width:280px;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
    text-align:left;
}
.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}
.card-title{
    padding:15px;
    font-weight:bold;
    font-size:16px;
}
.tech{
    padding:0 15px 15px;
}
.badge{
    display:inline-block;
    background:#00c6ff;
    color:black;
    padding:4px 8px;
    border-radius:4px;
    font-size:12px;
    margin:2px 2px 2px 0;
}
.card:hover{
    transform:translateY(-8px);
    box-shadow:0 8px 25px #00c6ff; /* 🔥 STRONGER BLUE HOVER */
}

/* SECTION HEADINGS AS CARDS */
.section-title{
    margin-top:100px;
    display:inline-block;
    padding:15px 40px;
    background:#15151c;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,198,255,0.2);
    transition:0.3s;
}
.section-title:hover{
    box-shadow:0 0 25px #00c6ff;
}

/* TYPING TEXT */
.typing{
    color:#ff00ff;
    font-size:18px;
    margin-top:10px;
    height:24px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:40px;
    color:#aaa;
}
</style>
</head>
<body>

<nav>
<div class="logo">Hina Atif</div>
<ul>

<li><a href="posts.html">Posts</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

</div>

<!-- FEATURED PROJECTS -->

<div class="projects">

<div class="card-title">AWS EC2 Docker Deployment</div>
<div class="tech">
<span class="badge">AWS</span>
<span class="badge">EC2</span>

</div>

<script>
// 🔥 TYPING EFFECT
const text = "Click project to view details";
let i = 0;

function typeEffect(){
    if(i < text.length){
        document.getElementById("typing-text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}

typeEffect();
</script>

</body>
</html>
