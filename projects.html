<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects | Hina Atif</title>

<style>
:root {
    --bg-dark: #0b0b0f;
    --card-bg: #15151c;
    --primary-cyan: #00c6ff;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg-dark);
    color: white;
    overflow-x: hidden;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 5%;
    position: fixed;
    width: 90%;
    z-index: 100;
    background: rgba(11, 11, 15, 0.95);
    backdrop-filter: blur(10px);
}

.logo {
    font-size: 26px;
    font-weight: bold;
    background: linear-gradient(90deg, #ff7a18, #ff00ff, #00c6ff);
    -webkit-background-clip: text;
    color: transparent;
    text-decoration: none;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 25px;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-size: 15px;
}

/* CONTAINER */
.container {
    text-align: center;
    padding: 140px 5% 60px;
    max-width: 1200px;
    margin: auto;
}

/* PROJECT GRID */
.projects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    margin-top: 40px;
}

/* CARD - Layout Protection */
.card {
    background: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
    transition: 0.4s;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(255,255,255,0.05);
}

.img-box {
    width: 100%;
    aspect-ratio: 16 / 9; /* Keeps all images the same height */
    overflow: hidden;
    background: #000;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Prevents squashing/stretching */
}

.card-title {
    padding: 20px 20px 5px;
    font-weight: bold;
    font-size: 18px;
}

.tech {
    padding: 10px 20px 25px;
    margin-top: auto;
}

.badge {
    display: inline-block;
    background: var(--primary-cyan);
    color: black;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    margin: 2px;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 30px rgba(0, 198, 255, 0.2);
    border-color: var(--primary-cyan);
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
    nav { flex-direction: column; padding: 15px 0; width: 100%; }
    nav ul { margin-top: 10px; gap: 15px; }
    .container { padding-top: 180px; }
}
</style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">Hina Atif</a>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<div class="container">
    <h1>Project Portfolio</h1>
    
    <div class="projects">
        
        <a href="https://github.com/Hina-Atif/aws-vpc-networking-project" target="_blank" class="card">
            <div class="img-box">
                <img src="VPC Networking.png" alt="VPC Networking">
            </div>
            <div class="card-title">AWS VPC Networking</div>
            <div class="tech">
                <span class="badge">VPC</span><span class="badge">Subnets</span><span class="badge">Networking</span>
            </div>
        </a>

        <a href="https://github.com/Hina-Atif/Scalable-Node.js-Deployment-on-AWS-ECS-Fargate" target="_blank" class="card">
            <div class="img-box">
                <img src="https://miro.medium.com/v2/resize:fit:1200/1*uPXK8mWGmh9JE63cfClY3g.png" alt="ECS Fargate">
            </div>
            <div class="card-title">Node.js ECS Fargate</div>
            <div class="tech">
                <span class="badge">ECS</span><span class="badge">Fargate</span><span class="badge">Docker</span>
            </div>
        </a>

        <a href="https://github.com/Hina-Atif/aws-python-http-api-project" target="_blank" class="card">
            <div class="img-box">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSwvE3BiLowL7-6cwDlIP4-g7_3nrsaGqqfDQ&s" alt="Python API">
            </div>
            <div class="card-title">AWS Python HTTP API</div>
            <div class="tech">
                <span class="badge">Python</span><span class="badge">API Gateway</span><span class="badge">Lambda</span>
            </div>
        </a>

    </div>
</div>

<footer>
    ✦ Hina Atif | © 2026 Portfolio
</footer>

</body>
</html>
