<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hina Atif | DevOps Cloud Engineer</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0f;
    color: white;
    overflow-x: hidden;
}

/* Cursor */
#cursor{
    width:18px;
    height:18px;
    border-radius:50%;
    background:#00c6ff;
    position:fixed;
    pointer-events:none;
    transform:translate(-50%, -50%);
    z-index:999;
    box-shadow:0 0 15px #00c6ff;
}

/* ===== FIXED NAVBAR ===== */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px; /* FIXED (was 80px causing overflow) */
    position:fixed;
    width:100%;
    z-index:1000;
    box-sizing:border-box; /* IMPORTANT FIX */
}

.logo{
    font-size:28px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff7a18,#ff00ff,#00c6ff);
    -webkit-background-clip:text;
    color:transparent;
}

/* FIX: prevent items going outside */
nav ul{
    list-style:none;
    display:flex;
    gap:20px; /* reduced from 30 */
    margin:0;
    padding:0;
    flex-wrap:wrap; /* ensures Contact never disappears */
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:500;
    white-space:nowrap;
}

nav ul li a:hover{
    color:#00c6ff;
}

/* Hero Section */
.hero {
    text-align:center;
    padding:160px 20px 80px 20px;
}

.hero img {
    width:180px;
    border-radius:50%;
    margin-bottom:20px;
    box-shadow:0 0 20px #00c6ff;
}

.hero h1 {
    font-size:48px;
    margin:10px 0;
}

.name-white {
    color:white;
    font-weight:bold;
}

.title-blue {
    color:#00c6ff;
    font-weight:500;
    font-size:24px;
    min-height:30px;
}

.hero .quote {
    margin:20px auto;
    font-style:italic;
    color:#aaa;
}

/* Tech Stack */
.tech-stack {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:40px;
}

.tech-stack div {
    background:#15151c;
    padding:15px 25px;
    border-radius:10px;
    font-weight:bold;
    box-shadow:0 0 10px #00c6ff;
}

/* Resume Button */
.btn {
    display:inline-block;
    margin-top:30px;
    padding:12px 30px;
    background:#00c6ff;
    border-radius:20px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

/* Footer */
footer {
    text-align:center;
    padding:40px;
    color:#aaa;
    margin-top:60px;
}
</style>
</head>

<body>

<div id="cursor"></div>

<nav>
    <div class="logo">Hina Atif</div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="posts.html">Posts</a>
        <a href="projects.html">Projects</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>
    
<section class="hero">
    <img src="assets/images/hina.png" alt="Hina Atif">
    <h1>Hi, I'm <span class="name-white">Hina Atif</span></h1>
    <h2 class="title-blue"><span id="typing"></span></h2>
    <p class="quote">"Cloud is the limit – deploy with confidence."</p>
    <a class="btn" href="assets/images/hina-resume.pdf" download="Hina_Atif_Resume">Download Resume</a>

    <div class="tech-stack">
        <div>AWS</div>
        <div>Docker</div>
        <div>Kubernetes</div>
        <div>Terraform</div>
        <div>Linux</div>
        <div>Python</div>
        <div>CI/CD</div>
    </div>
</section>

<footer>
    ✦ Hina Atif<br>
    © 2026 All Rights Reserved.
</footer>

<script>
// Cursor
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

// Typing animation
const text = "DevOps Cloud Engineer";
let i = 0;
function typing(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 80);
    }
}
typing();
</script>

</body>
</html>
